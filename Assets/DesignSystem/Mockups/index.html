<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Jam 3D - Garage & Main Hub (v6.0.0)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #E2E8F0; color: #1E293B; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .device-frame { width: 100%; max-width: 390px; aspect-ratio: 9 / 19.5; background: #F8FAFC; border-radius: 40px; box-shadow: 0 0 0 10px #CBD5E1, 0 30px 60px -15px rgba(15,23,42,0.25); position: relative; overflow: hidden; }
        .screen { width: 100%; height: 100%; position: relative; overflow: hidden; background: linear-gradient(180deg, #EFF6FF 0%, #F1F5F9 100%); display: flex; flex-direction: column; justify-content: space-between; padding: 40px 20px 24px; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; }
        .title { font-size: 1.5rem; font-weight: 900; color: #1E3A8A; letter-spacing: -0.02em; }
        .coin-pill { background: #FEF3C7; border: 2px solid #FDE047; padding: 6px 14px; border-radius: 100px; font-weight: 800; color: #B45309; font-size: 0.9rem; }

        /* Vehicle Garage Showcase Card */
        .garage-card { background: #FFFFFF; border-radius: 28px; padding: 20px; box-shadow: 0 12px 30px rgba(0,0,0,0.06); border: 2px solid #E2E8F0; text-align: center; margin: 20px 0; }
        .vehicle-preview { width: 100%; height: 140px; background: radial-gradient(circle, #E0F2FE 0%, #BAE6FD 100%); border-radius: 20px; display: flex; justify-content: center; align-items: center; font-size: 64px; margin-bottom: 12px; }
        .vehicle-name { font-size: 1.2rem; font-weight: 800; color: #0F172A; }
        .vehicle-type { font-size: 0.75rem; font-weight: 700; color: #64748B; text-transform: uppercase; margin-bottom: 12px; }
        .skin-select-btn { width: 100%; padding: 12px; border-radius: 16px; background: #3B82F6; color: #FFF; font-weight: 800; border: none; cursor: pointer; }

        /* Play Button */
        .play-btn { width: 100%; padding: 18px; border-radius: 24px; background: linear-gradient(135deg, #10B981, #059669); color: #FFF; font-size: 1.3rem; font-weight: 900; border: none; box-shadow: 0 10px 25px rgba(16,185,129,0.35); cursor: pointer; text-shadow: 0 2px 4px rgba(0,0,0,0.15); }
    </style>
</head>
<body>
    <div class="device-frame">
        <div class="screen">
            <div class="header">
                <div class="title">Color Jam 3D</div>
                <div class="coin-pill">💰 1,450</div>
            </div>

            <!-- Vehicle Garage Showcase -->
            <div class="garage-card">
                <div class="vehicle-preview">🍦</div>
                <div class="vehicle-name">Dondurma Arabası</div>
                <div class="vehicle-type">Kuşanılan Sarı Araç</div>
                <button class="skin-select-btn">Garajı Aç (12/24 Skin)</button>
            </div>

            <!-- Play Button & Editor Link -->
            <button class="play-btn" style="margin-bottom: 10px;">OYUNA BAŞLA (LEVEL 15)</button>
            <a href="editor-studio.html" style="display:block; text-align:center; padding:12px; border-radius:16px; background:#334155; color:#F8FAFC; text-decoration:none; font-weight:800; font-size:0.9rem;">🛠️ INTERAKTİF EDİTÖRÜ AÇ</a>
        </div>
    </div>
</body>
</html>
