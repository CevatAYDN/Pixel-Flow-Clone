<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Jam 3D - Levels & Settings (v6.0.0)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #E2E8F0; color: #1E293B; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .device-frame { width: 100%; max-width: 390px; aspect-ratio: 9 / 19.5; background: #F8FAFC; border-radius: 40px; box-shadow: 0 0 0 10px #CBD5E1, 0 30px 60px -15px rgba(15,23,42,0.25); position: relative; overflow: hidden; }
        .screen { width: 100%; height: 100%; padding: 40px 20px 24px; background: #F1F5F9; display: flex; flex-direction: column; }
        .header-title { font-size: 1.3rem; font-weight: 900; color: #0F172A; margin-bottom: 16px; }

        /* Level Grid */
        .level-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .level-box { aspect-ratio: 1; background: #FFFFFF; border-radius: 16px; border: 2px solid #E2E8F0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; color: #334155; box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
        .level-box.completed { background: #ECFDF5; border-color: #A7F3D0; color: #059669; }
        .stars { font-size: 10px; color: #F59E0B; margin-top: 2px; }
    </style>
</head>
<body>
    <div class="device-frame">
        <div class="screen">
            <div class="header-title">SEVİYE SEÇİMİ</div>
            <div class="level-grid">
                <div class="level-box completed"><span>1</span><span class="stars">⭐⭐⭐</span></div>
                <div class="level-box completed"><span>2</span><span class="stars">⭐⭐⭐</span></div>
                <div class="level-box completed"><span>3</span><span class="stars">⭐⭐⭐</span></div>
                <div class="level-box completed"><span>4</span><span class="stars">⭐⭐</span></div>
                <div class="level-box completed"><span>5</span><span class="stars">⭐⭐⭐</span></div>
                <div class="level-box completed"><span>6</span><span class="stars">⭐⭐</span></div>
                <div class="level-box completed"><span>7</span><span class="stars">⭐⭐⭐</span></div>
                <div class="level-box"><span>8</span><span class="stars">🔒</span></div>
            </div>
        </div>
    </div>
</body>
</html>
