<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Jam 3D - Splash Screen (v6.0.0)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #E2E8F0; color: #1E293B; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .device-frame { width: 100%; max-width: 390px; aspect-ratio: 9 / 19.5; background: linear-gradient(180deg, #3B82F6 0%, #1D4ED8 100%); border-radius: 40px; box-shadow: 0 0 0 10px #CBD5E1, 0 30px 60px -15px rgba(15,23,42,0.25); position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #FFF; text-align: center; }
        .logo-icon { font-size: 80px; margin-bottom: 10px; animation: bounce 1.5s infinite alternate; }
        .logo-title { font-size: 2.2rem; font-weight: 900; letter-spacing: -0.02em; text-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .logo-subtitle { font-size: 0.85rem; font-weight: 700; opacity: 0.8; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.1em; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    </style>
</head>
<body>
    <div class="device-frame">
        <div class="logo-icon">🚗💨</div>
        <div class="logo-title">Color Jam 3D</div>
        <div class="logo-subtitle">Traffic Flow & Collection</div>
    </div>
</body>
</html>
